<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Incoming...</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;">

    <div class="glass gatekeeper-container">
        <div class="lock-icon">⏳</div>
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Patience...</h1>
        <p style="color: var(--text-muted); font-size: 1.2rem;">Your gift unlocks at midnight.</p>

        <div id="countdown" class="countdown">
            Loading...
        </div>

        <button id="enter-btn" class="btn" style="display: none; margin-top: 1rem;" onclick="location.reload()">
            Enter Now
        </button>
    </div>

    <script>
        // Use the exact time provided by our Python backend
        const targetTime = new Date("{{ target_time }}").getTime();
        const countdownEl = document.getElementById("countdown");
        const enterBtn = document.getElementById("enter-btn");

        const updateTimer = () => {
            const now = new Date().getTime();
            const diff = targetTime - now;

            // If time is up!
            if (diff <= 0) {
                countdownEl.style.display = "none";
                enterBtn.style.display = "inline-block";
                clearInterval(interval);
                return;
            }

            // Math to calculate days, hours, mins, secs
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            // Add leading zeros so "1:5:9" looks like "01:05:09"
            const fh = h.toString().padStart(2, '0');
            const fm = m.toString().padStart(2, '0');
            const fs = s.toString().padStart(2, '0');

            if (d > 0) {
                countdownEl.innerText = `${d}d ${fh}h ${fm}m ${fs}s`;
            } else {
                countdownEl.innerText = `${fh}:${fm}:${fs}`;
            }
        };

        const interval = setInterval(updateTimer, 1000);
        updateTimer(); // Trigger immediately to prevent "Loading..." flash
    </script>
</body>

</html>
